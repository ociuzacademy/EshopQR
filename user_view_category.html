{% extends 'index.html' %}
{% block content %}

<!-- Header-->
<header class="bg-dark py-5">
    <div class="container px-4 px-lg-5 my-5">
        <div class="text-center text-white">
            <h1 class="display-4 fw-bolder" style="color:white">Product Categories</h1>
        </div>
    </div>
</header>

<!-- Search Box -->
<section class="py-2">
    <div class="container px-4 px-lg-5">
        <div class="input-group mb-3">
            <input type="text" class="form-control" placeholder="Search products..." aria-label="Search products..." aria-describedby="search-icon">
            <button class="btn btn-outline-secondary" type="button" id="search-icon">
                <i class="bi bi-search"></i> <!-- Bootstrap Icons Search Icon -->
            </button>
        </div>
    </div>
</section>

<!-- Section-->
<section class="py-3">
    <div class="container px-4 px-lg-5 mt-3">
        <div class="row gx-4 gx-lg-5">
            {% for category in categories %}
                <div class="col-md-3 mb-3">
                    <div class="card h-100 border border-dark position-relative">
                        <!-- Product image -->
                        <img class="card-img-top" src="{{ category.image.url }}" alt="{{ category.category }}" style="max-height: 80px; object-fit: contain;" />

                        <!-- Offer at the corner -->
                        {% if category.offer %}
                            <div style="position: absolute; top: 5px; right: 5px; background-color: red; color: white; border-radius: 50%; padding: 3px;" class="fw-bold">
                                {{ category.offer }}
                            </div>
                        {% endif %}

                        <!-- Product details -->
                        <div class="card-body p-2">
                            <div class="text-center">
                                <!-- Category name -->
                                <h4 class="fw-bolder">{{ category.category }}</h4>

                                <!-- Product price -->
                                <p class="fw-bold"><h3>Start Price: ₹{{ category.start_price }}</h3></p>
                            </div>
                        </div>

                        <!-- Product actions -->
                        <div class="card-footer p-2 pt-0 border-top-0 bg-transparent">
                            <div class="text-center">
                                <a class="btn btn-info" href="/all_view_products/{{category.id}}/"> Products</a>
                            </div>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>
</section>

<!-- Footer-->
<footer class="py-5 bg-dark">
    <div class="container"><p class="m-0 text-center text-white">Copyright &copy; Your Website 2023</p></div>
</footer>

<!-- Bootstrap core JS-->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Bootstrap Icons JS-->
<script src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.17.0/font/bootstrap-icons.js"></script>
<!-- Core theme JS-->
<script src="js/scripts.js"></script>
{% endblock %}
