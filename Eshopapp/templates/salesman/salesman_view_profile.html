{% extends 'salesman/salesman_home.html' %}

{% block content %}

<section class="section-hero overlay inner-page bg-image">
    <div class="block no-padding gray">
        <div class="container">
            <div class="row">
                
            </div>
        </div>
    </div>
</section>

<section class="section"><br><br>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow p-4">
                    <div class="account-popup-area signup-popup-box static">
                        <div class="account-popup"><br><br>
                            <form style="max-width: 500px; margin: 0 auto;">
                                <h1 style="color: blue;">Your Profile</h1>
                                {% comment %}
                                <div class="profile-icon text-center mb-4">
                                    <img src="{{ user_profile.profile_pic.url }}" class="img-fluid rounded-circle" alt="Profile Picture">
                                </div>
                                {% endcomment %}

                                <div class="form-group">
                                    <strong>Email:</strong>
                                    <input class="form-control" type="text" value="{{ salesman_profile.email }}" readonly>
                                </div>

                                <div class="form-group">
                                    <strong>Name:</strong>
                                    <input type="text" class="form-control" value="{{ salesman_profile.name }}" readonly>
                                </div>

                                <div class="form-group">
                                    <strong>Employee ID:</strong>
                                    <input type="text" class="form-control" value="{{ salesman_profile.licence_num }}" readonly>
                                </div>

                                <div class="form-group">
                                    <strong>Mobile:</strong>
                                    <input type="number" class="form-control" value="{{ salesman_profile.phn }}" readonly>
                                </div>

                                <div class="form-group">
                                    <strong>Address:</strong>
                                    <textarea class="form-control" readonly>{{ salesman_profile.adrs }}</textarea>
                                </div>

                                <div class="form-group">
                                    <strong>Place:</strong>
                                    <textarea class="form-control" readonly>{{ salesman_profile.plc }}</textarea>
                                </div>

                                {% comment %} <div class="text-center">
                                    <a href="/salesman_edit_profile/?id={{salesman_profile.id}}" class="btn btn-success">Edit Profile</a>
                                </div> {% endcomment %}
                            </form><br><br>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
