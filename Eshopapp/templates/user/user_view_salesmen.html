{% extends 'user/user_home.html' %}
{% block content %}
<div class="contact_section layout_padding">
    <div class="container-fluid">
        <h1 class="contact_taital">View Salesmen</h1>
        <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
        <a href="/user_request_salesman/" class="btn btn-primary">Request for a Salesman</a>
        {% if salesman %}
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="table-responsive">
                    <table class="table table-striped table-bordered">
                        <thead class="thead-dark">
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for i in salesman %}
                                <tr class="table-row">
                                    <td>{{ i.name }}</td>
                                    <td>{{ i.email }}</td>
                                    <td>
                                        <a href="/user_add_salesman_rating/{{i.id}}/" class="btn btn-success btn-sm">Add Rating</a>
                
                                    </td>
                                </tr>
                                <tr class="table-border"></tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        {% else %}
        <div class="alert alert-info" role="alert">
            No salesmen available.
        </div>
        {% endif %}
    </div>
</div>

<style>
    .table-row {
        background-color: #f8f9fa; /* Change the background color as needed */
    }

    .table-border {
        border-bottom: 1px solid #dee2e6; /* Add border color as needed */
    }
</style>

{% endblock %}
