{% extends 'user/user_home.html' %}
{% block content %}

<!-- Header-->
<header class="bg-dark py-5">
    <div class="container px-4 px-lg-5 my-5">
        <div class="text-center text-white">
            <h1 class="display-4 fw-bolder" style="color:white">Product Categories</h1>
        </div>
    </div>
</header>

<!-- Section-->
<section class="py-5">
    <div class="container px-4 px-lg-5 mt-5">
        <div class="row gx-4 gx-lg-5">
            {% for category in categories %}
                <div class="col-md-3 mb-4">
                    <div class="card h-100 border border-dark rounded position-relative card-hover">
                        <!-- Product image -->
                        <img class="card-img-top" src="{{ category.image.url }}" alt="{{ category.category }}" style="border-top-left-radius: 10px; border-top-right-radius: 10px; object-fit: cover; height: 200px;" />

                        <!-- Offer at the corner -->
                        {% if category.offer %}
                            <div style="position: absolute; top: 10px; right: 10px; background-color: red; color: white; border-radius: 50%; padding: 5px;" class="fw-bold">
                                {{ category.offer }}
                            </div>
                        {% endif %}

                        <!-- Product details -->
                        <div class="card-body p-3">
                            <div class="text-center">
                                <!-- Category name -->
                                <h4 class="fw-bolder" style="color: #343a40;">{{ category.category }}</h4>

                                <!-- Product price -->
                                <p class="fw-bold" style="color: #007bff;"><h3>₹{{ category.start_price }}</h3></p>
                            </div>
                        </div>

                        <!-- Product actions -->
                        <div class="card-footer p-3 border-top-0 bg-transparent">
                            <div class="text-center">
                                <a class="btn btn-primary" href="/user_view_products/{{category.id}}/" style="background-color: #007bff; border-color: #007bff;">View Products</a>
                            </div>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>
</section>

<!-- Footer-->
<footer class="py-5 bg-dark">
    <div class="container"><p class="m-0 text-center text-white">Copyright &copy; Your Website 2023</p></div>
</footer>

<!-- Additional CSS for Hover Effect and Styling -->
<style>
    .card-hover:hover {
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        transform: translateY(-8px);
        transition: all 0.3s ease-in-out;
    }

    .card-footer a.btn {
        border-radius: 25px;
    }
</style>

{% endblock %}
